version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: chat_app_postgres
    environment:
      POSTGRES_DB: chat_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - chat_network

  app:
    build: 
      context: ./backend
      dockerfile: ../Dockerfile
      args:
        - BUILDKIT_INLINE_CACHE=1
    container_name: chat_app
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres123
      DB_NAME: chat_db
      DJANGO_SETTINGS_MODULE: chat_backend.settings
    networks:
      - chat_network

volumes:
  postgres_data:

networks:
  chat_network:
    driver: bridge
